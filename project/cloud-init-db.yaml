#cloud-config
package_update: true
packages:
  - postgresql-14
  - postgresql-client-14
  - sysstat

# Configure logrotate for PostgreSQL logs
write_files:
  - path: /etc/logrotate.d/postgresql
    owner: root:root
    permissions: '0644'
    content: |
      /var/log/postgresql/*.log
      {
          daily
          rotate 7
          compress
          delaycompress
          missingok
          notifempty
          create 0640 postgres postgres
          sharedscripts
          postrotate
              systemctl reload postgresql > /dev/null 2>&1 || true
          endscript
      }
  
  # Connection leak detection script
  - path: /usr/local/bin/check-idle-connections.sh
    owner: root:root
    permissions: '0755'
    content: |
      #!/bin/bash
      
      # Detect idle connections and potential leaks
      # Run this script regularly to identify stale connections
      
      THRESHOLD_MINS=300  # Alert if connection idle > 5 minutes
      
      echo "=== IDLE CONNECTIONS REPORT ==="
      echo "Connections idle longer than $THRESHOLD_MINS minutes:"
      
      sudo -u postgres psql -c "
        SELECT
          pid,
          usename,
          application_name,
          backend_start,
          state,
          EXTRACT(EPOCH FROM (now() - query_start))::int AS idle_sec,
          query
        FROM pg_stat_activity
        WHERE state = 'idle'
          AND pid <> pg_backend_pid()
          AND EXTRACT(EPOCH FROM (now() - query_start)) > $THRESHOLD_MINS * 60
        ORDER BY backend_start ASC;
      "
      
      echo -e "\n=== CLOSE_WAIT CONNECTIONS (potential TCP leaks) ==="
      sudo -u postgres psql -c "
        SELECT
          pid,
          usename,
          application_name,
          state,
          query_start,
          now() - query_start as idle_duration
        FROM pg_stat_activity
        WHERE state = 'idle in transaction'
        ORDER BY query_start ASC;
      "

runcmd:
  - systemctl enable postgresql
  - systemctl start postgresql
  - sudo -u postgres psql -c "CREATE USER labuser WITH PASSWORD 'Lab@2024!';"
  - sudo -u postgres psql -c "CREATE DATABASE labdb OWNER labuser;"
  - sudo -u postgres psql -c "ALTER SYSTEM SET listen_addresses = '10.0.2.10';"
  - sudo -u postgres psql -c "ALTER SYSTEM SET max_connections = '20';"
  # Enable idle session timeout (recycles connections idle > 10 minutes)
  - sudo -u postgres psql -c "ALTER SYSTEM SET idle_session_timeout = '10min';"
  - echo 'host labdb labuser 10.0.1.0/24 md5' >> /etc/postgresql/14/main/pg_hba.conf
  - systemctl restart postgresql
  - echo "PostgreSQL configured with max_connections=20 and idle_session_timeout=10min"
